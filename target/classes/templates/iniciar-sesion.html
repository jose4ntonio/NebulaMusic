<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Iniciar Sesión</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">

        <!-- LOGO Y ENCABEZADO AÑADIDOS -->
        <div class="form-logo">
            <img src="/imgs/nebula-03.svg" alt="Logo Nébula">
        </div>

        <div class="form-header">
            <h3>Inicia Sesión</h3>
            <p style="color: #cdb5e0; font-size: 0.9rem; margin-top: 5px;">Ingresa tus credenciales de acceso</p>
        </div>

        <!-- FORMULARIO CON CLASES CORRECTAS -->
        <form method="post" action="/autentication" enctype="application/x-www-form-urlencoded">

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="correo@ejemplo.com"
                        required
                        minlength="5"
                        maxlength="100"
                >
            </div>

            <div class="form-group">
                <label for="contrasenia">Contraseña</label>
                <input
                        type="password"
                        name="contrasenia"
                        id="contrasenia"
                        placeholder="********"
                        required
                >
            </div>

            <div>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
                <button type="reset" class="btn-secondary">Limpiar el Formulario</button>
            </div>
        </form>

        <p class="link">¿Aún no tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </section>
</main>

<footer>
    <p>Copyright Nébula 2025.</p>
</footer>

</body>
</html>
