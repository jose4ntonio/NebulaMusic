<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Crear Cuenta</title>
    <link rel="stylesheet" href="../static/styles/styles.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">
        <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
            <h2>Crear Cuenta</h2>

            <div>
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="ej. Juanito Perez" required minlength="10" maxlength="100">
            </div>

            <div>
                <label filter="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="juanito@gmail.com" required>
            </div>

            <div>
                <label filter="contrasenia">Contraseña:</label>
                <input type="password" id="contrasenia" name="contrasenia" placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>

            <div>
                <label filter="txt_pseudonimo">Pseudónimo:</label>
                <input type="text" id="txt_pseudonimo" name="txt_pseudonimo" required pattern="[a-zA-Z]{3,10}-[0-9]{2,10}.*" placeholder="Nebula-2025">
            </div>

            <div>
                <label>Género:</label>
                <div>
                    <input type="radio" id="rad_femenino" name="rad_genero" value="femenino" required>
                    <label filter="rad_femenino">Femenino</label>

                    <input type="radio" id="rad_masculino" name="rad_genero" value="masculino">
                    <label filter="rad_masculino">Masculino</label>

                    <input type="radio" id="rad_otro" name="rad_genero" value="otro">
                    <label filter="rad_otro">Otro / Prefiero no decir</label>
                </div>
            </div>

            <div>
                <label filter="sel_suscripcion">Tipo Suscripción:</label>
                <select id="sel_suscripcion" name="sel_suscripcion" required>
                    <option value="">--Selecciona una opción--</option>
                    <option value="gratis">Gratis</option>
                    <option value="premium_mensual">Premium Mensual ($99/mes)</option>
                    <option value="premium_anual">Premium Anual ($899/mes)</option>
                </select>
            </div>

            <div>
                <label filter="fechaNacimiento">Fecha Nacimiento:</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
            </div>

            <div>
                <label filter="comentarios">Comentarios o Gustos:</label>
                <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="Cuéntanos que música te gusta..."></textarea>
            </div>

            <div>
                <input type="checkbox" id="terminos" name="chk_terminos" value="aceptado" required>
                <label filter="terminos">Acepto los términos y condiciones</label>
            </div>

            <div>
                <button type="submit">Registrarse</button>
                <button type="reset">Limpiar el Formulario</button>
            </div>
        </form>

        <p>¿Ya tienes una cuenta? <a href="iniciar-sesion.html">Inicia sesión aquí</a></p>
    </section>
</main>

<footer>
    <p>Copyright Nébula 2025.</p>
</footer>

</body>
</html>
