<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Crear Cuenta</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">

        <!-- LOGO Y ENCABEZADO AGRUPADOS -->
        <div class="form-logo">
            <img src="/imgs/nebula-03.svg" alt="Logo Nébula">
        </div>

        <div class="form-header">
            <h3>Crear Cuenta</h3>
            <p style="color: #cdb5e0; font-size: 0.9rem; margin-top: 5px;">Regístrate para empezar a disfrutar de tu música</p>
        </div>

        <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="ej. Juanito Perez" required minlength="10" maxlength="100">
            </div>

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="juanito@gmail.com" required>
            </div>

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="contrasenia">Contraseña:</label>
                <input type="password" id="contrasenia" name="contrasenia" placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="txt_pseudonimo">Pseudónimo:</label>
                <input type="text" id="txt_pseudonimo" name="txt_pseudonimo" required pattern="[a-zA-Z]{3,10}-[0-9]{2,10}.*" placeholder="Nebula-2025">
            </div>

            <!-- CONTENEDOR DE GÉNERO CORREGIDO CON .form-group Y .radio-group -->
            <div class="form-group">
                <label>Género:</label>
                <div class="radio-group">
                    <input type="radio" id="rad_femenino" name="rad_genero" value="femenino" required>
                    <label for="rad_femenino">Femenino</label>

                    <input type="radio" id="rad_masculino" name="rad_genero" value="masculino">
                    <label for="rad_masculino">Masculino</label>

                    <input type="radio" id="rad_otro" name="rad_genero" value="otro">
                    <label for="rad_otro">Otro / Prefiero no decir</label>
                </div>
            </div>

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="sel_suscripcion">Tipo Suscripción:</label>
                <select id="sel_suscripcion" name="sel_suscripcion" required>
                    <option value="">--Selecciona una opción--</option>
                    <option value="gratis">Gratis</option>
                    <option value="premium_mensual">Premium Mensual ($99/mes)</option>
                    <option value="premium_anual">Premium Anual ($899/mes)</option>
                </select>
            </div>

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="fechaNacimiento">Fecha Nacimiento:</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
            </div>

            <!-- AGRUPADO CON .form-group -->
            <div class="form-group">
                <label for="comentarios">Comentarios o Gustos:</label>
                <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="Cuéntanos que música te gusta..."></textarea>
            </div>

            <!-- AGRUPADO CON .form-group Y .checkbox-group -->
            <div class="form-group checkbox-group">
                <input type="checkbox" id="terminos" name="chk_terminos" value="aceptado" required>
                <label for="terminos">Acepto los términos y condiciones</label>
            </div>

            <div>
                <button type="submit" class="btn-primary">Registrarse</button>
                <button type="reset" class="btn-secondary">Limpiar el Formulario</button>
            </div>
        </form>

        <p class="link">¿Ya tienes una cuenta? <a href="iniciar-sesion.html">Inicia sesión aquí</a></p>
    </section>
</main>

<footer>
    <p>Copyright Nébula 2025.</p>
</footer>

</body>
</html>
