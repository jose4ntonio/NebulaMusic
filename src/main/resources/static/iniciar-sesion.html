<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Iniciar Sesión</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">
        <form method="post" action="/autentication" enctype="application/x-www-form-urlencoded">
            <h1>Iniciar Sesión</h1>

            <div>
                <label filter="correo">Correo Electrónico</label>
                <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="correo@ejemplo.com"
                        required
                        minlength="5"
                        maxlength="100"
                >
            </div>

            <div>
                <label filter="contrasenia">Contraseña</label>
                <input
                        type="password"
                        name="contrasenia"
                        id="contrasenia"
                        placeholder="********"
                        required
                >
            </div>

            <div>
                <button type="submit">Iniciar Sesión</button>
                <button type="reset">Limpiar el Formulario</button>
            </div>
        </form>
    </section>
</main>

<footer>
    <p>Copyright Nébula 2025.</p>
</footer>

</body>
</html>
